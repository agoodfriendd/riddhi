<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions - Page 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="questions.css">
</head>

<body>
    <div class="ethereal-bg" aria-hidden="true">
        <div class="ethereal-shadow-layer"></div>
        <div class="ethereal-noise"></div>
    </div>
    <div class="question-container">
        <h2>Question 2</h2>
        <img src="images/laadli3.gif" alt="Question 2 Image" class="question-img question-img--lg">
        <p class="question-text">Are you sure about me?</p>
        <button class="question-btn" id="yesBtn">Yes</button>
        <button class="question-btn" id="noBtn">No</button>
    </div>

    <div class="popup-bg" id="popupBg">
        <div class="popup">
            <img src="images/laadli4.jpg" alt="Popup Image" class="popup-img">
            <h3>Text me what's wrong</h3>
            <button class="question-btn" id="closePopupBtn">Okay</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
